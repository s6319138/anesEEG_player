        if(event.keyCode == 123) return false; // F12

    }

    <script>
        class MiniFFT {
            constructor(size) {
                this.size = size;
                this.reverseTable = new Uint32Array(size);
                let limit = 1, bit = size >> 1;
                while (limit < size) {
                    for (let i = 0; i < limit; i++) { this.reverseTable[i + limit] = this.reverseTable[i] + bit; }
                    limit <<= 1; bit >>= 1;
                }
            }
            calculate(real, imag) {
                const size = this.size;
                const reverseTable = this.reverseTable;
                for (let i = 0; i < size; i++) {
                    const j = reverseTable[i];
                    if (j > i) {
                        let temp = real[i]; real[i] = real[j]; real[j] = temp;
                        temp = imag[i]; imag[i] = imag[j]; imag[j] = temp;
                    }
                }
                let halfSize = 1;
                while (halfSize < size) {
                    const phaseShiftStepReal = Math.cos(-Math.PI / halfSize);
                    const phaseShiftStepImag = Math.sin(-Math.PI / halfSize);
                    let currentPhaseShiftReal = 1, currentPhaseShiftImag = 0;
                    for (let fftStep = 0; fftStep < halfSize; fftStep++) {
                        for (let i = fftStep; i < size; i += 2 * halfSize) {
                            const j = i + halfSize;
                            const tr = currentPhaseShiftReal * real[j] - currentPhaseShiftImag * imag[j];
                            const ti = currentPhaseShiftReal * imag[j] + currentPhaseShiftImag * real[j];
                            real[j] = real[i] - tr; imag[j] = imag[i] - ti;
                            real[i] += tr; imag[i] += ti;
                        }
                        let tmp = currentPhaseShiftReal;
                        currentPhaseShiftReal = tmp * phaseShiftStepReal - currentPhaseShiftImag * phaseShiftStepImag;
                        currentPhaseShiftImag = tmp * phaseShiftStepImag + currentPhaseShiftImag * phaseShiftStepReal;
                    }
                    halfSize <<= 1;
                }
            }
        }

        class SimpleEDFParser {
            constructor(arrayBuffer) {
                this.buffer = arrayBuffer;
                this.header = {};
                this.signals = [];
                this.parse();
            }
            parse() {
                const decoder = new TextDecoder();
                const view = new DataView(this.buffer);
                this.header.numRecords = parseInt(decoder.decode(this.buffer.slice(236, 244)).trim());
                this.header.recordDuration = parseFloat(decoder.decode(this.buffer.slice(244, 252)).trim());
                this.header.numSignals = parseInt(decoder.decode(this.buffer.slice(252, 256)).trim());
                const numSignals = this.header.numSignals;
                let offset = 256;
                const labels = [];
                for(let i=0; i<numSignals; i++) labels.push(decoder.decode(this.buffer.slice(offset + i*16, offset + (i+1)*16)).trim());
                offset += numSignals * (16 + 80 + 8); 
                const physicalMin = []; for(let i=0; i<numSignals; i++) physicalMin.push(parseFloat(decoder.decode(this.buffer.slice(offset + i*8, offset + (i+1)*8)).trim()));
                offset += numSignals * 8;
                const physicalMax = []; for(let i=0; i<numSignals; i++) physicalMax.push(parseFloat(decoder.decode(this.buffer.slice(offset + i*8, offset + (i+1)*8)).trim()));
                offset += numSignals * 8;
                const digitalMin = []; for(let i=0; i<numSignals; i++) digitalMin.push(parseFloat(decoder.decode(this.buffer.slice(offset + i*8, offset + (i+1)*8)).trim()));
                offset += numSignals * 8;
                const digitalMax = []; for(let i=0; i<numSignals; i++) digitalMax.push(parseFloat(decoder.decode(this.buffer.slice(offset + i*8, offset + (i+1)*8)).trim()));
                offset += numSignals * (8 + 80); 
                const samplesPerRecord = []; for(let i=0; i<numSignals; i++) samplesPerRecord.push(parseInt(decoder.decode(this.buffer.slice(offset + i*8, offset + (i+1)*8)).trim()));
                this.header.fs = samplesPerRecord[0] / this.header.recordDuration;
                this.signals = labels.map((label, i) => {
                    const rawGain = (physicalMax[i] - physicalMin[i]) / (digitalMax[i] - digitalMin[i]);
                    const offsetVal = physicalMax[i] / rawGain - digitalMax[i];
                    let unitMultiplier = 1.0;
                    if (Math.abs(physicalMax[i]) > 0 && Math.abs(physicalMax[i]) < 1.0) unitMultiplier = 1e6;
                    return { label: label.replace(/EEG\s*/g, ''), gain: rawGain * unitMultiplier, offset: offsetVal, data: new Float32Array(this.header.numRecords * samplesPerRecord[i]) };
                });
                let dataOffset = parseInt(decoder.decode(this.buffer.slice(184, 192)).trim());
                for (let r = 0; r < this.header.numRecords; r++) {
                    for (let s = 0; s < numSignals; s++) {
                        const count = samplesPerRecord[s];
                        const sigObj = this.signals[s];
                        for (let k = 0; k < count; k++) {
                            const intVal = view.getInt16(dataOffset, true);
                            sigObj.data[r*count + k] = (intVal + sigObj.offset) * sigObj.gain;
                            dataOffset += 2;
                        }
                    }
                }
            }
        }

        class SimpleR2AParser {
            constructor(arrayBuffer) {
                this.buffer = arrayBuffer;
                this.header = { fs: 128 };
                this.signals = [ {label: "BIS Ch1 (L)", data: null}, {label: "BIS Ch2 (R)", data: null} ];
                const view = new DataView(this.buffer);
                const totalSamples = Math.floor(this.buffer.byteLength / 4);
                this.signals[0].data = new Float32Array(totalSamples);
                this.signals[1].data = new Float32Array(totalSamples);
                const gain = 0.0511; 
                for(let i=0; i<totalSamples; i++) {
                    this.signals[0].data[i] = view.getInt16(i*4, true) * gain;
                    this.signals[1].data[i] = view.getInt16(i*4+2, true) * gain;
                }
            }
        }
    </script>

    <script>
        let neuroData, fs, totalSamples, currentTimeIdx = 0, isPlaying = false, wasPlaying = false, animationFrameId, lastFrameTime = 0;
        let ampScale = 2.0, windowSec = 12.0, activeChannels = [], channelLabels = [], channelOffsets = [0.25, 0.75], channelBaseScales = [], channelGlobalMeans = [];
        
        let dsaMinDB = -10; 
        let dsaMaxDB = 35; 
        let numTapers = 3; 

        // 4.0 秒步進單位 (預設為 Trend 4s)
        let dsaUpdateInterval = 4.0; 
        let dsaHistorySteps, dsaMaxFreqIdx, fullDSAMatrixL, fullDSAMatrixR, lastDsaTimeIdx = 0;
        let annotations = [], currentContext = null;

        const eegCanvas = document.getElementById('eegCanvas');
        const eegCtx = eegCanvas.getContext('2d');
        const dsaCanvas = document.getElementById('dsaCanvas');
        const dsaCtx = dsaCanvas.getContext('2d');
        const timeline = document.getElementById('timeline');
        const progressBar = document.getElementById('progressBar');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loaderText');

        // 根據檔案類型設定預設 DSA Range
        function applyDefaultRangeByExtension(ext) {
            if (ext === 'edf') {
                dsaMinDB = -20;
                dsaMaxDB = 20;
            } else {
                dsaMinDB = -10;
                dsaMaxDB = 35;
            }
            document.getElementById('dsaMinInput').value = dsaMinDB;
            document.getElementById('dsaMaxInput').value = dsaMaxDB;
        }

        function getSineTaper(k, N) {
            const t = new Float32Array(N);
            const factor = Math.PI * (k + 1) / (N + 1);
            let energy = 0;
            for (let n = 0; n < N; n++) { t[n] = Math.sin(factor * (n + 1)); energy += t[n] * t[n]; }
            energy = Math.sqrt(energy);
            for (let n = 0; n < N; n++) t[n] /= energy;
            return t;
        }

        function updateDsaRange() { 
            dsaMinDB = parseFloat(document.getElementById('dsaMinInput').value); 
            dsaMaxDB = parseFloat(document.getElementById('dsaMaxInput').value); 
            if (neuroData) drawDSAFromMatrix(); 
        }
        
        function updateDsaSpeed(val) { 
            dsaUpdateInterval = parseFloat(val); 
            if(neuroData) { 
                loader.style.display = 'flex'; 
                loaderText.innerText = "Recalculating DSA...";
                setTimeout(() => precomputeDSA(), 50); 
            } 
        }

        window.addEventListener('DOMContentLoaded', async () => {
            eegCanvas.width = eegCanvas.clientWidth; eegCanvas.height = eegCanvas.clientHeight;
            dsaCanvas.width = dsaCanvas.clientWidth; dsaCanvas.height = dsaCanvas.clientHeight;
            
            // 恢復初始化時讀取 cases_config.json 的功能
            try {
                const response = await fetch('cases_config.json');
                if (response.ok) {
                    const configCases = await response.json();
                    const select = document.getElementById('caseSelect');
                    configCases.forEach(c => {
                        presetCases[c.id] = { type: "remote", dataUrl: c.dataUrl, jsonUrl: c.jsonUrl };
                        const opt = document.createElement('option'); opt.value = c.id; opt.innerText = c.name;
                        select.insertBefore(opt, document.getElementById('localCaseMarker'));
                    });
                }
            } catch (err) {
                console.log("No cases_config.json found or network error.");
            }
        });

        function initializePlayerCore(parser) {
            neuroData = parser.signals; fs = parser.header.fs; totalSamples = neuroData[0].data.length;
            timeline.max = totalSamples; timeline.value = 0; currentTimeIdx = 0; lastDsaTimeIdx = 0;
            const numCh = Math.min(neuroData.length, 2);
            activeChannels = Array.from({length: numCh}, (_, i) => i);
            channelLabels = activeChannels.map(i => neuroData[i].label);
            channelBaseScales = new Array(numCh).fill(1.0);
            channelGlobalMeans = new Array(numCh).fill(0);
            resize(); calculateGlobalScales();
        }

        function precomputeDSA() {
            const nFFT = 256;
            const stepSamples = Math.floor(dsaUpdateInterval * fs);
            const nSteps = Math.floor(totalSamples / stepSamples);
            dsaMaxFreqIdx = Math.floor(30 / (fs / nFFT));
            // 歷史顯示長度 30 分鐘
            dsaHistorySteps = Math.floor(1800 / dsaUpdateInterval);
            
            fullDSAMatrixL = new Float32Array(nSteps * dsaMaxFreqIdx);
            fullDSAMatrixR = new Float32Array(nSteps * dsaMaxFreqIdx);
            const fft = new MiniFFT(nFFT);
            const tapers = [];
            for (let k = 0; k < numTapers; k++) tapers.push(getSineTaper(k, nFFT));
            
            let cur = 0;
            const process = () => {
                const limit = Math.min(cur + 200, nSteps);
                for (let i = cur; i < limit; i++) {
                    const start = i * stepSamples;
                    if (start + nFFT <= totalSamples) {
                        computeMultitaperSlice(0, start, i, fft, tapers, fullDSAMatrixL);
                        if (neuroData.length > 1) computeMultitaperSlice(1, start, i, fft, tapers, fullDSAMatrixR);
                    }
                }
                cur = limit;
                progressBar.style.width = Math.round(cur/nSteps*100) + "%";
                if (cur < nSteps) setTimeout(process, 0);
                else { loader.style.display = 'none'; drawDSAFromMatrix(); drawEEG(); }
            };
            process();
        }

        function computeMultitaperSlice(chIdx, start, stepIdx, fft, tapers, outMatrix) {
            const N = fft.size, raw = neuroData[chIdx].data, avgPower = new Float32Array(dsaMaxFreqIdx);
            for (let k = 0; k < numTapers; k++) {
                const real = new Float32Array(N), imag = new Float32Array(N), taper = tapers[k];
                let m = 0; for(let j=0; j<N; j++) m += (raw[start+j] || 0); m/=N;
                for(let j=0; j<N; j++) real[j] = ((raw[start+j] || 0) - m) * taper[j];
                fft.calculate(real, imag);
                for(let f=0; f<dsaMaxFreqIdx; f++) avgPower[f] += (real[f]*real[f] + imag[f]*imag[f]) / numTapers;
            }
            const offset = stepIdx * dsaMaxFreqIdx;
            for(let f=0; f<dsaMaxFreqIdx; f++) outMatrix[offset + f] = 10 * Math.log10(avgPower[f] + 1e-12);
        }

        function drawEEG() {
            eegCtx.fillStyle = 'black'; eegCtx.fillRect(0, 0, eegCanvas.width, eegCanvas.height);
            if (!neuroData) return;
            const windowSamples = Math.floor(windowSec * fs);
            const currentMod = Math.floor(currentTimeIdx) % windowSamples;
            const kStart = Math.max(0, Math.floor(currentTimeIdx) - windowSamples);
            activeChannels.forEach((ch, i) => {
                const raw = neuroData[ch].data, mean = channelGlobalMeans[i], scale = channelBaseScales[i] * ampScale, yOff = eegCanvas.height * channelOffsets[i];
                eegCtx.beginPath(); eegCtx.strokeStyle = '#FFFF00';
                let first = true, prevX = -1;
                const drawStep = Math.max(1, Math.floor(windowSamples / eegCanvas.width));
                for (let k = kStart; k <= Math.floor(currentTimeIdx); k += drawStep) {
                    const x = ((k % windowSamples) / windowSamples) * eegCanvas.width, y = yOff - (raw[k] - mean) * scale;
                    if (first || x < prevX) { eegCtx.moveTo(x, y); first = false; } else eegCtx.lineTo(x, y);
                    prevX = x;
                }
                eegCtx.stroke();
            });
            eegCtx.fillStyle = 'red'; eegCtx.fillRect((currentMod / windowSamples) * eegCanvas.width, 0, 2, eegCanvas.height);
        }

        // 整數塊狀更新 (Block Update)
        function drawDSAFromMatrix() {
            if (!fullDSAMatrixL) return;
            const w = dsaCanvas.width, h = dsaCanvas.height;
            const gap = 20, chanH = (h - gap) / 2;
            const imgData = dsaCtx.createImageData(w, h), pixels = imgData.data;
            
            // 使用 Math.floor 確保更新是塊狀步進，減少重繪頻率且呈現區塊視覺
            const currentStep = Math.floor(currentTimeIdx / (dsaUpdateInterval * fs));
            const startStep = currentStep - dsaHistorySteps;
            
            for (let x = 0; x < w; x++) {
                const stepIdx = Math.floor(startStep + (x / w * dsaHistorySteps));
                
                if (stepIdx < 0 || stepIdx >= fullDSAMatrixL.length / dsaMaxFreqIdx) {
                    for(let y=0; y<h; y++) {
                        const p = (y * w + x) * 4;
                        pixels[p]=0; pixels[p+1]=0; pixels[p+2]=0; pixels[p+3]=255;
                    }
                    continue;
                }

                const offset = stepIdx * dsaMaxFreqIdx;
                for (let y = 0; y < h; y++) {
                    let val = -999;
                    if (y < chanH) {
                        const freqRatio = 1 - (y / chanH);
                        val = fullDSAMatrixL[offset + Math.floor(freqRatio * dsaMaxFreqIdx)];
                    } else if (y >= chanH + gap) {
                        const freqRatio = (y - (chanH + gap)) / chanH;
                        val = fullDSAMatrixR ? fullDSAMatrixR[offset + Math.floor(freqRatio * dsaMaxFreqIdx)] : -99;
                    }

                    const p = (y * w + x) * 4;
                    if (val < -150) {
                        pixels[p]=0; pixels[p+1]=0; pixels[p+2]=0; pixels[p+3]=255;
                    } else {
                        const c = getJet((val - dsaMinDB) / (dsaMaxDB - dsaMinDB));
                        pixels[p]=c[0]; pixels[p+1]=c[1]; pixels[p+2]=c[2]; pixels[p+3]=255;
                    }
                }
            }
            dsaCtx.putImageData(imgData, 0, 0);

            // 標記 Y 軸 (Hz)
            dsaCtx.fillStyle = "white"; dsaCtx.font = "bold 10px monospace"; dsaCtx.textAlign = "left";
            [0, 10, 20, 30].forEach(f => {
                const yTop = chanH * (1 - f/30);
                dsaCtx.fillText(f + "Hz", 5, yTop + (f === 0 ? -2 : 10));
                const yBottom = (chanH + gap) + (chanH * f/30);
                dsaCtx.fillText(f + "Hz", 5, yBottom + (f === 30 ? -2 : 10));
            });

            // 標記通道 (L/R)
            dsaCtx.fillStyle = "#aaa"; dsaCtx.textAlign = "right";
            dsaCtx.fillText(channelLabels[0] || "L", w - 5, 12);
            dsaCtx.fillText(channelLabels[1] || "R", w - 5, h - 5);

            dsaCtx.fillStyle = 'red'; dsaCtx.fillRect(w-2, 0, 2, h);
        }

        function getJet(v) {
            v = Math.max(0, Math.min(1, v));
            if (v < 0.25) return [0, 0, Math.floor(100+155*v/0.25)];
            if (v < 0.5) return [0, Math.floor(255*(v-0.25)/0.25), 255];
            if (v < 0.75) return [Math.floor(255*(v-0.5)/0.25), 255, Math.floor(255*(1-(v-0.5)/0.25))];
            return [255, Math.floor(255*(1-(v-0.75)/0.25)), 0];
        }

        function togglePlay() { 
            if (!neuroData) return; isPlaying = !isPlaying; 
            document.getElementById('btnPlay').innerText = isPlaying ? "⏸ Pause" : "▶ Play";
            document.getElementById('btnPlay').style.background = isPlaying ? "#880000" : "#006600";
            if (isPlaying) { lastFrameTime = performance.now(); loop(); }
        }

        function loop() {
            if (!isPlaying) return;
            const now = performance.now(), dt = (now - lastFrameTime) / 1000; lastFrameTime = now;
            currentTimeIdx += fs * dt;
            if (currentTimeIdx >= totalSamples) { currentTimeIdx = totalSamples - 1; togglePlay(); }
            timeline.value = currentTimeIdx;
            updateTimeText(); 
            drawEEG();
            
            // 優化: 只有當時間跨過設定的區間時才重新繪製 DSA，節省效能
            if (currentTimeIdx - lastDsaTimeIdx >= dsaUpdateInterval * fs || currentTimeIdx < lastDsaTimeIdx) {
                drawDSAFromMatrix(); 
                lastDsaTimeIdx = currentTimeIdx;
            }
            
            animationFrameId = requestAnimationFrame(loop);
        }

        function resize() { 
            eegCanvas.width = eegCanvas.clientWidth; eegCanvas.height = eegCanvas.clientHeight;
            dsaCanvas.width = dsaCanvas.clientWidth; dsaCanvas.height = dsaCanvas.clientHeight;
            if(neuroData) { drawEEG(); drawDSAFromMatrix(); }
        }
        window.addEventListener('resize', resize);
        function updateTimeText() {
            const sec = Math.floor(currentTimeIdx / fs), h = Math.floor(sec/3600).toString().padStart(2,'0'), m = Math.floor((sec%3600)/60).toString().padStart(2,'0'), s = (sec%60).toString().padStart(2,'0');
            document.getElementById('txtTime').innerText = `${h}:${m}:${s}`;
        }
        function adjustAmp(f) { ampScale *= f; document.getElementById('txtAmp').innerText = "x" + ampScale.toFixed(1); if(!isPlaying) drawEEG(); }
        function updateZoom(v) { windowSec = 120 / v; document.getElementById('txtZoom').innerText = windowSec.toFixed(1) + "s"; if(!isPlaying) drawEEG(); }
        function onSeekStart() { wasPlaying = isPlaying; isPlaying = false; }
        function onSeek(v) { 
            currentTimeIdx = parseInt(v); 
            updateTimeText(); 
            drawEEG(); 
            drawDSAFromMatrix(); 
            lastDsaTimeIdx = currentTimeIdx; 
        }
        function onSeekEnd() { if (wasPlaying) togglePlay(); }
        function calculateGlobalScales() { activeChannels.forEach((ch, i) => { const raw = neuroData[ch].data; let sum = 0, cnt = 0; for(let k=0; k<raw.length; k+=Math.floor(raw.length/2000)) { sum+=raw[k]; cnt++; } channelGlobalMeans[i]=sum/cnt; channelBaseScales[i]=(eegCanvas.height/5)/50; }); }

        function handleFileSelect(event) {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader(); reader.onload = (e) => {
                const ext = file.name.split('.').pop().toLowerCase();
                let parser = (ext === 'edf') ? new SimpleEDFParser(e.target.result) : new SimpleR2AParser(e.target.result);
                
                // 自動套用合適的預設 Range
                applyDefaultRangeByExtension(ext);

                initializePlayerCore(parser);
                loader.style.display = 'flex'; setTimeout(() => precomputeDSA(), 50);
            }; reader.readAsArrayBuffer(file);
        }

        let presetCases = { 
            "local_case1": { 
                type: "local", 
                context: { patient: "範例案例", note: "套用本機標註測試。" }, 
                annotations: [ { timeIdx: 128 * 60, label: "測試註記 A", color: "#00FF00" } ] 
            } 
        };

        async function loadPresetCase(key) {
            if(!key) return; 
            const info = presetCases[key];
            if(!info) return;

            // 遠端載入邏輯
            if(info.type === "remote") {
                loader.style.display = 'flex';
                loaderText.innerText = "Downloading Case...";
                try {
                    const res = await fetch(info.dataUrl); const buf = await res.arrayBuffer();
                    const ext = info.dataUrl.split('.').pop().toLowerCase();
                    
                    // 自動套用合適的預設 Range
                    applyDefaultRangeByExtension(ext);

                    initializePlayerCore((ext === 'edf') ? new SimpleEDFParser(buf) : new SimpleR2AParser(buf));
                    const jRes = await fetch(info.jsonUrl); 
                    if(jRes.ok) { 
                        const p = await jRes.json(); 
                        annotations = p.annotations || []; 
                        currentContext = p.context || null; 
                    }
                    renderContextPanel(); renderAnnotationDots(); precomputeDSA();
                } catch(e) {
                    alert("載入線上案例失敗");
                    loader.style.display = 'none';
                }
            } else if (info.type === "local") {
                if(!neuroData) { alert("請先開啟波形檔案。"); document.getElementById('caseSelect').value = ""; return; }
                annotations = [...info.annotations]; currentContext = info.context || null;
                renderContextPanel(); renderAnnotationDots(); drawEEG(); drawDSAFromMatrix();
            }
        }

        function toggleContextPanel() { const p = document.getElementById('contextPanel'); p.style.display = (p.style.display === 'none') ? 'block' : 'none'; }
        function renderContextPanel() {
            if(!currentContext) return; document.getElementById('btnContext').style.display = 'inline-block';
            document.getElementById('contextContent').innerHTML = `病患: ${currentContext.patient || '--'}<br>備註: ${currentContext.note || '--'}`;
        }
        function openContextEditor() { document.getElementById('contextModal').style.display = 'flex'; }
        function closeContextEditor() { document.getElementById('contextModal').style.display = 'none'; }
        function saveContextEditor() {
            currentContext = { patient: document.getElementById('ctxPatient').value, surgery: document.getElementById('ctxSurgery').value, note: document.getElementById('ctxNote').value };
            closeContextEditor(); renderContextPanel();
        }
        function addCurrentTimeAnnotation() {
            const label = document.getElementById('noteInput').value; if(!label) return;
            annotations.push({ timeIdx: Math.floor(currentTimeIdx), label, color: document.getElementById('noteColor').value });
            renderAnnotationDots(); document.getElementById('noteInput').value = '';
        }
        function renderAnnotationDots() {
            const container = document.getElementById('annotationTimeline'); container.innerHTML = '';
            const sel = document.getElementById('eventSelect'); sel.innerHTML = '<option value="">-- 跳轉事件 --</option>';
            if(!totalSamples) return;
            annotations.forEach((n, i) => {
                const dot = document.createElement('div'); 
                dot.style.cssText = `position:absolute;left:${(n.timeIdx/totalSamples)*100}%;width:6px;height:100%;background:${n.color};cursor:pointer;border-radius:2px;`;
                dot.onclick = () => { currentTimeIdx = n.timeIdx; timeline.value = currentTimeIdx; updateTimeText(); drawEEG(); drawDSAFromMatrix(); }; 
                container.appendChild(dot);
                const opt = document.createElement('option'); opt.value = i; opt.innerText = n.label; sel.appendChild(opt);
            });
        }
        function jumpToEvent(i) { if(i==="") return; currentTimeIdx = annotations[i].timeIdx; timeline.value = currentTimeIdx; updateTimeText(); drawEEG(); drawDSAFromMatrix(); }
        function exportAnnotations() {
            const data = JSON.stringify({ context: currentContext, annotations });
            const blob = new Blob([data], {type: "application/json"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `EEG_Annotations.json`; a.click();
        }
    </script>
</body>
