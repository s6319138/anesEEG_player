<!DOCTYPE html>
<html lang="zh-TW">
<head>
<script>
    // 禁用滑鼠右鍵選單
    document.addEventListener('contextmenu', event => event.preventDefault());

    // 禁用 F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U 等開發者快捷鍵
    document.onkeydown = function(e) {
        if(event.keyCode == 123) return false; // F12
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; 
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; 
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; 
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
    }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Neuro Player (True Clinical Sweep)</title>
    <style>
        body { background-color: #000000; color: #d5d5d5; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        .controls { display: flex; gap: 10px; background: #222; padding: 10px; border-radius: 8px; margin-bottom: 10px; align-items: center; width: 95%; flex-wrap: wrap; box-shadow: 0 4px 6px rgba(0,0,0,0.5);}
        button { background: #333; color: white; border: 1px solid #555; padding: 5px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #444; }
        .btn-play { background: #006600; }
        .plot-container { position: relative; width: 95%; margin-bottom: 10px; border: 1px solid #333; background: #000; }
        .plot-label { position: absolute; left: 5px; top: 5px; color: #FFFF00; font-size: 12px; pointer-events: none; z-index: 10; text-shadow: 1px 1px 2px black;}
        canvas { display: block; width: 100%; height: 100%; }
        #timeline { width: 95%; margin: 10px 0; cursor: pointer; }
        
        .progress-container { width: 100%; background-color: #444; height: 20px; border-radius: 4px; margin-top: 5px; display: none; }
        .progress-bar { width: 0%; height: 100%; background-color: #00aa00; border-radius: 4px; text-align: center; line-height: 20px; font-size: 12px; color: white; transition: width 0.1s; }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: flex; justify-content: center; align-items: center; z-index: 999; display: none; flex-direction: column; }
    </style>

    <script>
        class MiniFFT {
            constructor(size) {
                this.size = size;
                this.reverseTable = new Uint32Array(size);
                this.sinTable = new Float32Array(size);
                this.cosTable = new Float32Array(size);
                let limit = 1, bit = size >> 1;
                while (limit < size) {
                    for (let i = 0; i < limit; i++) { this.reverseTable[i + limit] = this.reverseTable[i] + bit; }
                    limit <<= 1; bit >>= 1;
                }
                for (let i = 0; i < size; i++) {
                    this.sinTable[i] = Math.sin(-Math.PI / i);
                    this.cosTable[i] = Math.cos(-Math.PI / i);
                }
            }
            calculate(real, imag) {
                const size = this.size;
                const reverseTable = this.reverseTable;
                for (let i = 0; i < size; i++) {
                    const j = reverseTable[i];
                    if (j > i) {
                        let temp = real[i]; real[i] = real[j]; real[j] = temp;
                        temp = imag[i]; imag[i] = imag[j]; imag[j] = temp;
                    }
                }
                let halfSize = 1;
                while (halfSize < size) {
                    const phaseShiftStepReal = Math.cos(-Math.PI / halfSize);
                    const phaseShiftStepImag = Math.sin(-Math.PI / halfSize);
                    let currentPhaseShiftReal = 1, currentPhaseShiftImag = 0;
                    for (let fftStep = 0; fftStep < halfSize; fftStep++) {
                        for (let i = fftStep; i < size; i += 2 * halfSize) {
                            const j = i + halfSize;
                            const tr = currentPhaseShiftReal * real[j] - currentPhaseShiftImag * imag[j];
                            const ti = currentPhaseShiftReal * imag[j] + currentPhaseShiftImag * real[j];
                            real[j] = real[i] - tr; imag[j] = imag[i] - ti;
                            real[i] += tr; imag[i] += ti;
                        }
                        let tmp = currentPhaseShiftReal;
                        currentPhaseShiftReal = tmp * phaseShiftStepReal - currentPhaseShiftImag * phaseShiftStepImag;
                        currentPhaseShiftImag = tmp * phaseShiftStepImag + currentPhaseShiftImag * phaseShiftStepReal;
                    }
                    halfSize <<= 1;
                }
            }
        }

        // --- 引擎 1：Sedline EDF 解析器 ---
        class SimpleEDFParser {
            constructor(arrayBuffer) {
                this.buffer = arrayBuffer;
                this.header = {};
                this.signals = [];
                this.parse();
            }
            parse() {
                const decoder = new TextDecoder();
                const view = new DataView(this.buffer);
                const fileLength = this.buffer.byteLength; 

                if (fileLength < 256) throw new Error("EDF File too small.");

                this.header.numRecords = parseInt(decoder.decode(this.buffer.slice(236, 244)).trim());
                this.header.recordDuration = parseFloat(decoder.decode(this.buffer.slice(244, 252)).trim());
                this.header.numSignals = parseInt(decoder.decode(this.buffer.slice(252, 256)).trim());
                const headerBytes = parseInt(decoder.decode(this.buffer.slice(184, 192)).trim());

                const numSignals = this.header.numSignals;
                let offset = 256;
                
                const labels = [];
                for(let i=0; i<numSignals; i++) labels.push(decoder.decode(this.buffer.slice(offset + i*16, offset + (i+1)*16)).trim());
                offset += numSignals * (16 + 80 + 8); 
                
                const physicalMin = []; for(let i=0; i<numSignals; i++) physicalMin.push(parseFloat(decoder.decode(this.buffer.slice(offset + i*8, offset + (i+1)*8)).trim()));
                offset += numSignals * 8;
                const physicalMax = []; for(let i=0; i<numSignals; i++) physicalMax.push(parseFloat(decoder.decode(this.buffer.slice(offset + i*8, offset + (i+1)*8)).trim()));
                offset += numSignals * 8;
                
                const digitalMin = []; for(let i=0; i<numSignals; i++) digitalMin.push(parseFloat(decoder.decode(this.buffer.slice(offset + i*8, offset + (i+1)*8)).trim()));
                offset += numSignals * 8;
                const digitalMax = []; for(let i=0; i<numSignals; i++) digitalMax.push(parseFloat(decoder.decode(this.buffer.slice(offset + i*8, offset + (i+1)*8)).trim()));
                offset += numSignals * (8 + 80); 
                
                const samplesPerRecord = []; for(let i=0; i<numSignals; i++) samplesPerRecord.push(parseInt(decoder.decode(this.buffer.slice(offset + i*8, offset + (i+1)*8)).trim()));
                
                this.header.fs = samplesPerRecord[0] / this.header.recordDuration;
                this.signals = labels.map((label, i) => {
                    const rawGain = (physicalMax[i] - physicalMin[i]) / (digitalMax[i] - digitalMin[i]);
                    const offsetVal = physicalMax[i] / rawGain - digitalMax[i];
                    
                    let unitMultiplier = 1.0;
                    if (Math.abs(physicalMax[i]) > 0 && Math.abs(physicalMax[i]) < 1.0) {
                        unitMultiplier = 1e6; // 轉換為 µV
                    }

                    return { 
                        label: label.replace(/EEG\s*/g, ''), 
                        gain: rawGain * unitMultiplier, 
                        offset: offsetVal, 
                        data: new Float32Array(this.header.numRecords * samplesPerRecord[i])
                    };
                });
                
                let dataOffset = headerBytes;
                const numRecords = this.header.numRecords;
                try {
                    for (let r = 0; r < numRecords; r++) {
                        for (let s = 0; s < numSignals; s++) {
                            const count = samplesPerRecord[s];
                            const sigObj = this.signals[s];
                            if (dataOffset + count * 2 > fileLength) throw "EOF"; 
                            for (let k = 0; k < count; k++) {
                                const intVal = view.getInt16(dataOffset, true);
                                sigObj.data[r*count + k] = (intVal + sigObj.offset) * sigObj.gain;
                                dataOffset += 2;
                            }
                        }
                    }
                } catch (e) { if (e !== "EOF") console.error(e); }
            }
        }

        // --- 引擎 2：BIS R2A 解析器 ---
        class SimpleR2AParser {
            constructor(arrayBuffer) {
                this.buffer = arrayBuffer;
                this.header = {};
                this.signals = [];
                this.parse();
            }
            parse() {
                const view = new DataView(this.buffer);
                const fileLength = this.buffer.byteLength; 

                this.header.fs = 128; 
                this.header.numSignals = 2; 
                const gain = 0.0511; 
                
                const labels = ["BIS Ch1 (L)", "BIS Ch2 (R)"];
                this.signals = labels.map((label) => {
                    return { label: label, data: null };
                });
                
                const bytesPerSample = 2; 
                const totalSamples = Math.floor(fileLength / (this.header.numSignals * bytesPerSample));

                for(let s = 0; s < this.header.numSignals; s++) {
                    this.signals[s].data = new Float32Array(totalSamples);
                }

                let dataOffset = 0;
                try {
                    for (let i = 0; i < totalSamples; i++) {
                        for (let s = 0; s < this.header.numSignals; s++) {
                            if (dataOffset + bytesPerSample > fileLength) throw "EOF"; 
                            const intVal = view.getInt16(dataOffset, true);
                            this.signals[s].data[i] = intVal * gain;
                            dataOffset += bytesPerSample;
                        }
                    }
                } catch (e) { 
                    if (e !== "EOF") console.error("Parse Error:", e); 
                }
            }
        }
    </script>
</head>
<body>

    <div class="loading-overlay" id="loader">
        <h2 id="loaderText">Loading Neuro Data...</h2>
        <div class="progress-container" style="display:block; width: 300px;">
            <div class="progress-bar" id="progressBar">0%</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="document.getElementById('fileInput').click()">📂 Open .edf / .r2a</button>
        <input type="file" id="fileInput" accept=".edf, .r2a" style="display: none;" onchange="handleFileSelect(event)">
        
        <button class="btn-play" id="btnPlay" onclick="togglePlay()">▶ Play</button>
        
        <div style="border-left:1px solid #555; height:20px; margin:0 10px;"></div>

        <label>Amp:</label>
        <button onclick="adjustAmp(0.8)">-</button>
        <span id="txtAmp" style="width:40px; text-align:center;">x2.0</span>
        <button onclick="adjustAmp(1.25)">+</button>

        <label style="margin-left: 15px;">EEG Zoom:</label>
        <input type="range" id="zoomSlider" min="5" max="40" value="10" oninput="updateZoom(this.value)">
        <span id="txtZoom" style="width:40px; text-align:center;">12s</span>

        <label style="margin-left: 15px;">DSA Speed:</label>
        <select id="dsaSpeedSel" onchange="updateDsaSpeed(this.value)" style="background:#333; color:white; border:1px solid #555; padding:5px;">
            <option value="4.0">Trend (4s)</option>
            <option value="1.0" selected>Fast (1s)</option>
            <option value="0.5">Turbo (0.5s)</option>
        </select>

        <span id="txtTime" style="margin-left: auto; color: #00ff00; font-family: monospace; font-size: 16px;">00:00:00</span>
    </div>

    <div class="plot-container" style="height: 40vh;">
        <canvas id="eegCanvas"></canvas>
        <div class="plot-label" id="lblEeg">EEG (RAW µV - Sweep Mode)</div>
    </div>

    <input type="range" id="timeline" min="0" max="1000" value="0" step="1" oninput="onSeek(this.value)" onmousedown="onSeekStart()" onmouseup="onSeekEnd()">

    <div class="plot-container" style="height: 40vh;">
        <canvas id="dsaCanvas"></canvas>
        <div class="plot-label">DSA Trend (Raw Blocks / Top: Ch1, Bottom: Ch2)</div>
    </div>

    <script>
        let neuroData = null; 
        let fs = 128;
        let totalSamples = 0;
        let currentTimeIdx = 0;
        let isPlaying = false;
        let wasPlaying = false;
        let animationFrameId;
        let lastFrameTime = 0;
        let currentFileType = "";

        let ampScale = 2.0; 
        let windowSec = 12.0;
        
        let activeChannels = []; 
        let channelLabels = []; 
        const channelOffsets = [0.25, 0.75]; 
        let channelBaseScales = [];
        let channelGlobalMeans = []; 

        const dsaWindowSec = 4.0;
        let dsaUpdateInterval = 1.0; 
        
        let fullDSAMatrixL = null; 
        let fullDSAMatrixR = null;
        let dsaMaxFreqIdx = 0; 
        let dsaHistorySteps = 0;
        let lastDsaTimeIdx = 0; 
        
        const dsaBufferCanvas = document.createElement('canvas');
        const dsaCtxBuffer = dsaBufferCanvas.getContext('2d');
        
        const eegCanvas = document.getElementById('eegCanvas');
        const eegCtx = eegCanvas.getContext('2d');
        const dsaCanvas = document.getElementById('dsaCanvas');
        const dsaCtx = dsaCanvas.getContext('2d');
        const timeline = document.getElementById('timeline');
        const progressBar = document.getElementById('progressBar');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loaderText');

        function resize() {
            eegCanvas.width = eegCanvas.clientWidth;
            eegCanvas.height = eegCanvas.clientHeight;
            dsaCanvas.width = dsaCanvas.clientWidth;
            dsaCanvas.height = dsaCanvas.clientHeight;
            dsaBufferCanvas.width = dsaCanvas.width;
            dsaBufferCanvas.height = dsaCanvas.height;
            dsaCtxBuffer.fillStyle = 'black';
            dsaCtxBuffer.fillRect(0, 0, dsaBufferCanvas.width, dsaBufferCanvas.height);
            dsaCtx.fillStyle = 'black';
            dsaCtx.fillRect(0, 0, dsaCanvas.width, dsaCanvas.height);
            if(!isPlaying && neuroData) { calculateGlobalScales(); drawEEG(); drawDSAFromMatrix(); }
        }
        window.addEventListener('resize', resize);

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            document.getElementById('loader').style.display = 'flex';
            isPlaying = false; 
            if(animationFrameId) cancelAnimationFrame(animationFrameId);

            const ext = file.name.split('.').pop().toLowerCase();
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    let parser;
                    if (ext === 'edf') {
                        parser = new SimpleEDFParser(e.target.result);
                        currentFileType = "Sedline EDF";
                    } else if (ext === 'r2a') {
                        parser = new SimpleR2AParser(e.target.result);
                        currentFileType = "BIS R2A";
                    } else {
                        throw new Error("Unsupported file format.");
                    }

                    ampScale = 2.0;
                    document.getElementById('txtAmp').innerText = "x" + ampScale.toFixed(1);
                    document.getElementById('lblEeg').innerText = `${currentFileType} EEG (RAW µV - Sweep Mode)`;

                    neuroData = parser.signals;
                    fs = parser.header.fs;
                    if (!neuroData[0] || neuroData[0].data.length === 0) throw new Error("No valid data parsed.");
                    totalSamples = neuroData[0].data.length;
                    
                    timeline.max = totalSamples;
                    timeline.value = 0;
                    currentTimeIdx = 0;
                    lastDsaTimeIdx = 0;
                    
                    const numChannelsToRender = Math.min(neuroData.length, 2);
                    activeChannels = Array.from({length: numChannelsToRender}, (_, i) => i);
                    channelLabels = activeChannels.map(i => neuroData[i].label);
                    
                    channelBaseScales = new Array(numChannelsToRender).fill(1.0);
                    channelGlobalMeans = new Array(numChannelsToRender).fill(0);

                    resize(); 
                    calculateGlobalScales(); 

                    loaderText.innerText = "Pre-calculating DSA...";
                    setTimeout(() => precomputeDSA(), 50);
                } catch (err) {
                    alert("Parsing Error: " + err);
                    document.getElementById('loader').style.display = 'none';
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function calculateGlobalScales() {
            if(!neuroData) return;
            const targetHalfHeight = eegCanvas.height / 4.0;
            const pixelsPerUv = (targetHalfHeight * 0.8) / 50.0;

            activeChannels.forEach((chIndex, i) => {
                const rawData = neuroData[chIndex].data;
                let sum = 0, count = 0;
                const step = Math.max(1, Math.floor(rawData.length / 5000));
                
                for (let k = 0; k < rawData.length; k += step) {
                    sum += rawData[k];
                    count++;
                }
                
                channelGlobalMeans[i] = sum / count; 
                channelBaseScales[i] = pixelsPerUv;
            });
        }

        function precomputeDSA() {
            const stepSamples = Math.floor(dsaUpdateInterval * fs);
            const nSteps = Math.floor(totalSamples / stepSamples);
            const windowSamples = Math.floor(dsaWindowSec * fs);
            
            const nFFT = 256; 
            const df = fs / nFFT;
            dsaMaxFreqIdx = Math.floor(30 / df); 
            dsaHistorySteps = Math.floor((10.0 * 60) / dsaUpdateInterval); 

            fullDSAMatrixL = new Float32Array(nSteps * dsaMaxFreqIdx);
            fullDSAMatrixR = new Float32Array(nSteps * dsaMaxFreqIdx);

            let currentStep = 0;
            const batchSize = 100; 

            const processBatch = () => {
                try {
                    const fft = new MiniFFT(nFFT);
                    const real = new Float32Array(nFFT);
                    const imag = new Float32Array(nFFT);
                    const signalArr = new Float32Array(nFFT); 

                    const limit = Math.min(currentStep + batchSize, nSteps);
                    
                    for (let i = currentStep; i < limit; i++) {
                        const end = (i + 1) * stepSamples;
                        const start = end - windowSamples;
                        
                        if (start >= 0 && end <= totalSamples) {
                            computeOneSlice(0, start, end, i, fft, real, imag, signalArr, fullDSAMatrixL);
                            if (neuroData.length > 1) {
                                computeOneSlice(1, start, end, i, fft, real, imag, signalArr, fullDSAMatrixR);
                            }
                        }
                    }

                    currentStep = limit;
                    const pct = Math.round((currentStep / nSteps) * 100);
                    progressBar.style.width = pct + "%";
                    progressBar.innerText = pct + "%";

                    if (currentStep < nSteps) {
                        setTimeout(processBatch, 0); 
                    } else {
                        document.getElementById('loader').style.display = 'none';
                        drawEEG();
                        drawDSAFromMatrix(); 
                    }
                } catch(e) {
                    console.error(e);
                    alert("DSA Error");
                    document.getElementById('loader').style.display = 'none';
                }
            };
            processBatch();
        }

        function computeOneSlice(chIdx, start, end, stepIdx, fft, real, imag, signalArr, outMatrix) {
            if(chIdx >= neuroData.length) return;
            const raw = neuroData[chIdx].data;
            const len = end - start;
            let mean = 0; for(let k=0; k<len; k++) mean += raw[start+k]; mean /= len;
            signalArr.fill(0);
            for(let k=0; k<len && k<signalArr.length; k++) {
                const win = 0.5 * (1 - Math.cos(2 * Math.PI * k / (len - 1)));
                signalArr[k] = (raw[start+k] - mean) * win;
            }
            for(let k=0; k<fft.size; k++) { real[k] = signalArr[k]; imag[k] = 0; }
            fft.calculate(real, imag);
            const offset = stepIdx * dsaMaxFreqIdx;
            
            let tempDB = new Float32Array(dsaMaxFreqIdx);
            for(let f=0; f<dsaMaxFreqIdx; f++) {
                const mag = Math.sqrt(real[f]*real[f] + imag[f]*imag[f]);
                tempDB[f] = 10 * Math.log10(mag + 1e-12);
            }
            for(let f=0; f<dsaMaxFreqIdx; f++) {
                let val = tempDB[f] * 0.5;
                let w = 0.5;
                if(f>0) { val += tempDB[f-1]*0.25; w+=0.25; }
                if(f<dsaMaxFreqIdx-1) { val += tempDB[f+1]*0.25; w+=0.25; }
                outMatrix[offset + f] = val / w;
            }
        }

        function loop() {
            if (!isPlaying) return;
            try {
                const now = performance.now();
                const dt = (now - lastFrameTime) / 1000; 
                lastFrameTime = now;
                if (dt > 0.1) { animationFrameId = requestAnimationFrame(loop); return; }

                const step = fs * dt; 
                currentTimeIdx += step;
                if (currentTimeIdx >= totalSamples) {
                    currentTimeIdx = totalSamples - 1;
                    isPlaying = false;
                    document.getElementById('btnPlay').innerText = "▶ Play";
                    document.getElementById('btnPlay').style.background = "#006600";
                }
                
                timeline.value = currentTimeIdx;
                updateTimeText();
                drawEEG();
                checkAndDrawDSA();
                
                if(isPlaying) animationFrameId = requestAnimationFrame(loop);
            } catch(e) {
                console.error(e);
                isPlaying = false;
            }
        }

        // --- 核心更新：完美的環繞式掃描演算法 (Sweep Wrap-around) ---
        function drawEEG() {
            if (!neuroData) return;
            eegCtx.fillStyle = 'black';
            eegCtx.fillRect(0, 0, eegCanvas.width, eegCanvas.height);
            
            const windowSamples = Math.floor(windowSec * fs);
            
            // 強制轉換為整數，避免浮點數陣列索引導致讀取到 undefined (即 NaN)
            const currentIntIdx = Math.floor(currentTimeIdx);
            const currentMod = currentIntIdx % windowSamples;
            
            // 0.2秒的擦除區塊 (Erase Bar)
            const eraseSamples = Math.floor(0.2 * fs); 
            
            // 靜態背景：1秒間隔的網格線
            eegCtx.save();
            eegCtx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; 
            eegCtx.lineWidth = 1;
            eegCtx.setLineDash([3, 3]); 
            eegCtx.beginPath();
            
            for (let s = 1; s <= windowSec; s++) {
                const x = (s / windowSec) * eegCanvas.width;
                eegCtx.moveTo(x, 0);
                eegCtx.lineTo(x, eegCanvas.height);
            }
            eegCtx.stroke();
            eegCtx.restore();

            eegCtx.font = '10px monospace';
            eegCtx.textAlign = 'right';
            eegCtx.textBaseline = 'middle';

            // 決定要繪製的資料起迄點：從「當下時間 往前推一整個視窗(排除擦除區)」到「當下時間」
            const kStart = Math.max(0, currentIntIdx - windowSamples + eraseSamples);
            const kEnd = currentIntIdx;

            activeChannels.forEach((chIndex, i) => {
                const signalObj = neuroData[chIndex];
                const rawData = signalObj.data; 
                
                const globalMean = channelGlobalMeans[i]; 
                const totalScale = channelBaseScales[i] * ampScale;
                const yOffset = eegCanvas.height * channelOffsets[i];

                const refUV = 50; 
                const pxOffset = refUV * totalScale;

                // 繪製電壓參考線
                eegCtx.save();
                eegCtx.strokeStyle = '#333'; eegCtx.setLineDash([2, 2]); 
                eegCtx.beginPath(); eegCtx.moveTo(0, yOffset - pxOffset); eegCtx.lineTo(eegCanvas.width, yOffset - pxOffset); eegCtx.stroke();
                eegCtx.beginPath(); eegCtx.moveTo(0, yOffset + pxOffset); eegCtx.lineTo(eegCanvas.width, yOffset + pxOffset); eegCtx.stroke();
                eegCtx.setLineDash([]); 
                eegCtx.beginPath(); eegCtx.moveTo(0, yOffset); eegCtx.lineTo(eegCanvas.width, yOffset); eegCtx.stroke();
                eegCtx.fillStyle = '#666';
                eegCtx.fillText("+50µV", eegCanvas.width - 5, yOffset - pxOffset);
                eegCtx.fillText("-50µV", eegCanvas.width - 5, yOffset + pxOffset);
                eegCtx.restore();

                // 開始畫環繞波形
                eegCtx.beginPath();
                eegCtx.strokeStyle = '#FFFF00';
                eegCtx.lineWidth = 1.2;
                
                const drawStep = Math.max(1, Math.floor(windowSamples / eegCanvas.width));
                let first = true;
                let prevX = -1;
                
                const endLimit = Math.min(kEnd, totalSamples - 1);
                
                for (let k = kStart; k <= endLimit; k += drawStep) {
                    const val = (rawData[k] - globalMean); 
                    
                    // 利用 modulo 計算 x 座標，產生環繞效果
                    const x = ((k % windowSamples) / windowSamples) * eegCanvas.width;
                    const y = yOffset - (val * totalScale);
                    
                    // 當 x 突然變小 (例如從畫面最右邊跳回最左邊)，代表跨越了視窗邊界，必須斷開線條 (moveTo)
                    if (first || x < prevX) {
                        eegCtx.moveTo(x, y);
                        first = false;
                    } else {
                        eegCtx.lineTo(x, y);
                    }
                    prevX = x;
                }
                eegCtx.stroke();
                
                eegCtx.fillStyle = '#aaa';
                eegCtx.textAlign = 'left';
                eegCtx.fillText(channelLabels[i], 10, yOffset - 10);
            });
            
            // 繪製紅色的垂直掃描游標 (Pen)
            const cursorX = (currentMod / windowSamples) * eegCanvas.width;
            eegCtx.fillStyle = '#FF0000';
            eegCtx.fillRect(cursorX, 0, 2, eegCanvas.height);
        }

        function checkAndDrawDSA() {
            if (!neuroData) return;
            const samplesStep = dsaUpdateInterval * fs;
            if (currentTimeIdx - lastDsaTimeIdx >= samplesStep) {
                drawDSAFromMatrix();
                lastDsaTimeIdx = currentTimeIdx;
            }
        }

        function drawDSAFromMatrix() {
            if (!fullDSAMatrixL) return;
            const stepSamples = Math.floor(dsaUpdateInterval * fs);
            const currentStep = Math.floor(currentTimeIdx / stepSamples);
            const startStep = currentStep - dsaHistorySteps;
            const w = dsaCanvas.width;
            const h = dsaCanvas.height;
            const imgData = dsaCtx.createImageData(w, h);
            const pixels = imgData.data;
            const gap = 16; 
            const midH = Math.floor(h / 2);
            const topPartBottom = midH - Math.floor(gap / 2);
            const bottomPartTop = midH + Math.ceil(gap / 2);
            const totalStepsInView = dsaHistorySteps;

            for (let x = 0; x < w; x++) {
                const relPos = x / w; 
                const stepIdx = Math.floor(startStep + (relPos * totalStepsInView));
                if (stepIdx < 0 || stepIdx * stepSamples >= totalSamples) {
                    for (let y = 0; y < h; y++) {
                        const pIdx = (y * w + x) * 4;
                        pixels[pIdx]=0; pixels[pIdx+1]=0; pixels[pIdx+2]=0; pixels[pIdx+3]=255;
                    }
                    continue;
                }
                const offset = stepIdx * dsaMaxFreqIdx;
                if (offset + dsaMaxFreqIdx > fullDSAMatrixL.length) continue;

                for (let y = 0; y < topPartBottom; y++) {
                    const freqRatio = 1 - (y / topPartBottom); 
                    const freqIdx = Math.floor(freqRatio * dsaMaxFreqIdx);
                    if (freqIdx >= 0 && freqIdx < dsaMaxFreqIdx) {
                        const val = fullDSAMatrixL[offset + freqIdx];
                        const color = getFixedJetColor((val + 5) / 30);
                        const pIdx = (y * w + x) * 4;
                        pixels[pIdx]=color[0]; pixels[pIdx+1]=color[1]; pixels[pIdx+2]=color[2]; pixels[pIdx+3]=255;
                    }
                }
                for (let y = topPartBottom; y < bottomPartTop; y++) {
                    const pIdx = (y * w + x) * 4;
                    pixels[pIdx]=0; pixels[pIdx+1]=0; pixels[pIdx+2]=0; pixels[pIdx+3]=255;
                }
                for (let y = bottomPartTop; y < h; y++) {
                    const freqRatio = (y - bottomPartTop) / (h - bottomPartTop);
                    const freqIdx = Math.floor(freqRatio * dsaMaxFreqIdx);
                    if (freqIdx >= 0 && freqIdx < dsaMaxFreqIdx) {
                        const val = fullDSAMatrixR ? fullDSAMatrixR[offset + freqIdx] : -99;
                        const color = getFixedJetColor((val + 5) / 30);
                        const pIdx = (y * w + x) * 4;
                        pixels[pIdx]=color[0]; pixels[pIdx+1]=color[1]; pixels[pIdx+2]=color[2]; pixels[pIdx+3]=255;
                    }
                }
            }
            dsaCtx.putImageData(imgData, 0, 0);
            
            dsaCtx.fillStyle = '#FF0000';
            dsaCtx.fillRect(w - 2, 0, 2, h);
        }

        function getFixedJetColor(v) {
            if(isNaN(v)) return [0,0,0];
            v = Math.max(0, Math.min(1, v));
            let r=0, g=0, b=0;
            if (v < 0.25) { let t=v/0.25; r=0; g=0; b=Math.floor(100+155*t); }
            else if (v < 0.5) { let t=(v-0.25)/0.25; r=0; g=Math.floor(255*t); b=255; }
            else if (v < 0.75) { let t=(v-0.5)/0.25; r=Math.floor(255*t); g=255; b=Math.floor(255*(1-t)); }
            else { let t=(v-0.75)/0.25; r=255; g=Math.floor(255*(1-t)); b=0; }
            return [r, g, b];
        }

        function togglePlay() {
            if (!neuroData) return;
            isPlaying = !isPlaying;
            document.getElementById('btnPlay').innerText = isPlaying ? "⏸ Pause" : "▶ Play";
            document.getElementById('btnPlay').style.background = isPlaying ? "#880000" : "#006600";
            if (isPlaying) {
                lastFrameTime = performance.now();
                loop();
            } else if(animationFrameId) cancelAnimationFrame(animationFrameId);
        }

        function adjustAmp(factor) {
            ampScale *= factor;
            document.getElementById('txtAmp').innerText = "x" + ampScale.toFixed(1);
            if (!isPlaying) drawEEG();
        }

        function updateZoom(val) {
            let scale = val / 10.0;
            windowSec = 12.0 / scale;
            document.getElementById('txtZoom').innerText = windowSec.toFixed(1) + "s";
            if (!isPlaying) drawEEG();
        }

        function updateDsaSpeed(val) {
            dsaUpdateInterval = parseFloat(val);
            if(neuroData) {
                document.getElementById('loader').style.display = 'flex';
                loaderText.innerText = "Recalculating DSA...";
                setTimeout(() => precomputeDSA(), 50);
            }
        }

        function updateTimeText() {
            const sec = Math.floor(currentTimeIdx / fs);
            const h = Math.floor(sec / 3600).toString().padStart(2, '0');
            const m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            document.getElementById('txtTime').innerText = `${h}:${m}:${s}`;
        }

        function onSeekStart() {
            wasPlaying = isPlaying;
            isPlaying = false;
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
        }
        function onSeek(val) {
            if (!neuroData) return;
            currentTimeIdx = parseInt(val);
            updateTimeText();
            drawEEG();
            drawDSAFromMatrix(); 
        }
        function onSeekEnd() {
            if (wasPlaying) togglePlay();
        }
    </script>
</body>
